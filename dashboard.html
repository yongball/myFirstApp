<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css?v=33">
</head>
<body>
    <div class="container status-window" style="padding: 40px 30px;">
        <h2 style="letter-spacing: 2px; margin-bottom: 25px;">CHARACTER STATUS</h2>
        
        <div class="avatar-box" style="padding: 10px; margin-bottom: 20px; border-width: 4px;">
            <img src="pixel_character_sprite_1776946328557.png" alt="Player Character" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        
        <h2 id="welcome-message" style="font-size: 20px; margin-bottom: 15px; color: var(--primary-color);">[게스트] 님, 환영합니다!</h2>
        <p style="text-align: center; color: #888; margin-bottom: 25px; font-size: 14px;">성공적으로 접속되었습니다.</p>

        <!-- 버튼 스타일 고도화 (v31) -->
        <div style="display: flex; gap: 15px; margin-bottom: 35px; justify-content: center;">
            <button class="btn btn-play" onclick="openGameSelect()" style="padding: 12px 25px; min-width: 140px;">GAME PLAY</button>
            <button class="btn btn-exit" onclick="handleLogout()" style="padding: 12px 25px; min-width: 140px;">GAME EXIT</button>
        </div>

        <div class="stats-grid" style="margin-bottom: 35px; gap: 20px;">
            <div class="stat-item">
                <div class="stat-label">LEVEL</div>
                <div class="stat-value">LV. 1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">CLASS</div>
                <div class="stat-value">BEGINNER</div>
            </div>
            <div class="stat-item" style="grid-column: span 2;">
                <div class="stat-label">HP</div>
                <div class="hp-bar-container" style="height: 18px;">
                    <div class="hp-bar-fill"></div>
                </div>
            </div>
            <div class="stat-item" style="grid-column: span 2;">
                <div class="stat-label">EXP</div>
                <div class="hp-bar-container" style="height: 18px;">
                    <div class="exp-bar-fill"></div>
                </div>
            </div>
        </div>

        <div class="inventory-section">
            <h3 style="font-size: 16px; color: var(--secondary-color); margin-bottom: 15px; border-bottom: 2px solid #555; padding-bottom: 5px;">INVENTORY</h3>
            <div class="inventory-grid">
                <div class="inventory-slot" onclick="showItemInfo('sword')">🗡️</div>
                <div class="inventory-slot" onclick="showItemInfo('shield')">🛡️</div>
                <div class="inventory-slot" onclick="showItemInfo('potion')">🧪</div>
                <div class="inventory-slot" onclick="showItemInfo('gold')">💰</div>
                <div class="inventory-slot"></div>
                <div class="inventory-slot"></div>
                <div class="inventory-slot"></div>
                <div class="inventory-slot"></div>
            </div>
        </div>

    </div>

    <!-- 게임 선택 인벤토리 모달 -->
    <div id="game-select-modal" class="modal-overlay" onclick="closeGameSelect()">
        <div class="modal-content" style="max-width: 400px;" onclick="event.stopPropagation()">
            <h3 style="color: var(--secondary-color); margin-bottom: 20px; border-bottom: 2px solid #555; padding-bottom: 10px;">GAME CARTRIDGES</h3>
            <div class="inventory-grid" style="grid-template-columns: repeat(2, 1fr); gap: 15px;">
                <div class="inventory-slot" style="height: 120px; flex-direction: column; cursor: pointer;" onclick="navigateTo('game.html')">
                    <span style="font-size: 30px; margin-bottom: 10px;">🫧</span>
                    <span style="font-size: 10px; color: var(--primary-color);">BUBBLE POP</span>
                </div>
                <div class="inventory-slot" style="height: 120px; flex-direction: column; cursor: pointer;" onclick="navigateTo('game_tetris.html')">
                    <span style="font-size: 30px; margin-bottom: 10px;">🧱</span>
                    <span style="font-size: 10px; color: #ff00ff;">TETRIS</span>
                </div>
                <!-- 지뢰찾기 팩 -->
                <div class="inventory-slot" style="height: 120px; flex-direction: column; cursor: pointer;" onclick="navigateTo('game_mines.html')">
                    <span style="font-size: 30px; margin-bottom: 10px;">💣</span>
                    <span style="font-size: 10px; color: #39ff14;">MINESWEEPER</span>
                </div>
                <!-- 공룡 게임 팩 (NEW) -->
                <div class="inventory-slot" style="height: 120px; flex-direction: column; cursor: pointer;" onclick="navigateTo('game_dino.html')">
                    <span style="font-size: 30px; margin-bottom: 10px;">🦖</span>
                    <span style="font-size: 10px; color: #ffcc00;">DINO RUN</span>
                </div>
                <!-- 잠긴 슬롯 예시 -->
                <div class="inventory-slot" style="height: 120px; opacity: 0.3; cursor: not-allowed;">
                    <span style="font-size: 30px; margin-bottom: 10px;">🔒</span>
                    <span style="font-size: 10px;">COMING SOON</span>
                </div>
            </div>
            <button class="btn" onclick="closeGameSelect()" style="margin-top: 20px; font-size: 14px;">CLOSE</button>
        </div>
    </div>

    <!-- 아이템 정보 팝업 모달 -->
    <div id="item-modal" class="modal-overlay" onclick="closeItemInfo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-item-name" style="color: var(--primary-color); margin-bottom: 15px;">아이템 이름</h3>
            <p id="modal-item-desc" style="color: #ccc; line-height: 1.6; margin-bottom: 20px;">아이템 설명</p>
            <button class="btn" onclick="closeItemInfo()" style="padding: 10px; font-size: 14px;">CLOSE</button>
        </div>
    </div>

    <script src="auth.js?v=33"></script>
    <script>
        const userName = localStorage.getItem('name');
        if (userName) {
            // 사용자 이름을 사용하지 않고 '[게스트] 님'으로 고정
            document.getElementById('welcome-message').innerText = "[게스트] 님, 환영합니다!";
        } else {
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
