<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css?v=33">
</head>
<body>
    <div class="container" style="text-align: center; padding: 60px 30px;">
        <h1 class="game-title" style="margin-bottom: 40px;">YONGBALL<br>WORLD</h1>
        
        <div style="display: flex; flex-direction: column; gap: 18px; width: 100%;">
            <button class="btn" onclick="handleGuestLogin()">GUEST LOGIN</button>
            <button class="btn" onclick="navigateTo('login.html')" style="background-color: transparent; border-color: #555; color: #888;">EMAIL LOGIN</button>
        </div>

        <div style="margin-top: 35px; font-size: 13px; color: #666; letter-spacing: 1px;">
            NEW PLAYER? <a href="signup.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold; border-bottom: 1px solid var(--primary-color); padding-bottom: 2px;">CREATE ACCOUNT</a>
        </div>
    </div>
    <script src="auth.js?v=33"></script>
</body>
</html>
