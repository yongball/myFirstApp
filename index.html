<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center;">
        <img src="pixel_game_logo_1776946263664.png" alt="Pixel World Logo" style="max-width: 100%; height: auto; margin-bottom: 20px; border: 4px solid #fff; box-shadow: 4px 4px 0px #000;">
        <h2>PLAYER LOGIN</h2>
        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">PLAYER ID (EMAIL)</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
            </div>
            <div class="input-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="button" class="btn" onclick="handleLogin()">LOGIN</button>
            <button type="button" class="btn" onclick="handleGuestLogin()" style="margin-top: 15px; border-color: #ffff00; color: #ffff00;">GUEST LOGIN</button>
        </form>
        <div class="link-text">
            NEW PLAYER? <a href="signup.html">CREATE ACCOUNT</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
