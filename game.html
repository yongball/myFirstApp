<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE BOBBLE - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            box-shadow: 0 0 30px var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-title" style="font-size: 24px;">PUZZLE BOBBLE</div>
        
        <div id="game-container" style="position: relative; background: #000; border: 4px solid #fff; overflow: hidden; cursor: crosshair; margin-bottom: 20px;">
            <canvas id="gameCanvas" width="320" height="480"></canvas>
            <div id="game-score" style="position: absolute; top: 15px; right: 15px; color: #ffff00; font-size: 18px; text-shadow: 2px 2px 0 #000;">SCORE: 0</div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button class="btn" onclick="navigateTo('dashboard.html')" style="padding: 10px 25px;">BACK TO MENU</button>
            <button class="btn" onclick="location.reload()" style="padding: 10px 25px; border-color: #ffff00; color: #ffff00;">RESTART</button>
        </div>
        
        <p style="margin-top: 20px; font-size: 12px; color: #aaa;">[ 마우스를 움직여 조준하고 클릭하여 발사하세요! ]</p>
    </div>

    <script src="script.js"></script>
    <script>
        // 페이지 로드 시 바로 게임 시작
        window.onload = () => {
            startGame();
        };
    </script>
</body>
</html>
