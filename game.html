<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUZZLE BOBBLE - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            box-shadow: 0 0 30px var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;">🔵 PUZZLE BOBBLE</h2>
        
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            <!-- 메인 게임 보드 -->
            <div id="game-container" style="position: relative; background: #000; border: 4px solid #fff; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); cursor: crosshair;">
                <canvas id="gameCanvas" width="320" height="480"></canvas>
            </div>

            <!-- 사이드 정보 패널 -->
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <!-- 점수판 -->
                <div style="background: #222; border: 3px solid #555; padding: 10px; width: 100px; text-align: center;">
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;">High</div>
                    <div id="high-score" style="color: #ff00ff; font-size: 18px; margin-bottom: 10px;">0</div>
                    
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;">Score</div>
                    <div id="game-score" style="color: #ffff00; font-size: 18px;">0</div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn" onclick="navigateTo('dashboard.html')" style="padding: 10px 25px;">BACK TO MENU</button>
            <button class="btn" onclick="location.reload()" style="padding: 10px 25px; border-color: #ffff00; color: #ffff00;">RESTART</button>
        </div>
        
        <p style="margin-top: 20px; font-size: 12px; color: #aaa;">[ 마우스를 움직여 조준하고 클릭하여 발사하세요! ]</p>
    </div>

    <script src="auth.js?v=11"></script>
    <script src="game_bobble.js?v=11"></script>
    <script>
        // 페이지 로드 시 바로 게임 시작
        window.onload = () => {
            startGame();
        };
    </script>
</body>
</html>
