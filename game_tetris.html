<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            box-shadow: 0 0 30px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;">🧱 TETRIS</h2>
        
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            <!-- 메인 게임 보드 -->
            <div id="game-container" style="position: relative; background: #000; border: 4px solid #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);">
                <canvas id="tetrisCanvas" width="200" height="400"></canvas>
            </div>

            <!-- 사이드 정보 패널 -->
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <!-- NEXT 블록 미리보기 -->
                <div style="background: #222; border: 3px solid #555; padding: 10px; width: 100px; text-align: center;">
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 10px; text-transform: uppercase;">Next</div>
                    <div style="background: #000; border: 2px inset #444; width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
                        <canvas id="nextCanvas" width="60" height="60"></canvas>
                    </div>
                </div>

                <!-- 점수판 -->
                <div style="background: #222; border: 3px solid #555; padding: 10px; width: 100px; text-align: center;">
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;">High</div>
                    <div id="high-score" style="color: #ff00ff; font-size: 18px; margin-bottom: 10px;">0</div>
                    
                    <div style="font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;">Score</div>
                    <div id="game-score" style="color: #ffff00; font-size: 18px;">0</div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="btn" onclick="navigateTo('dashboard.html')" style="padding: 10px 25px;">BACK TO MENU</button>
            <button class="btn" onclick="location.reload()" style="padding: 10px 25px; border-color: #ffff00; color: #ffff00;">RESTART</button>
        </div>
        
        <div style="margin-top: 20px; color: #aaa; font-size: 11px; text-align: center; line-height: 1.6;">
            [ 키보드 방향키로 조작하세요 ]<br>
            ← → : 이동 / ↑ : 회전 / ↓ : 빠르게 내리기
        </div>
    </div>

    <script src="auth.js?v=11"></script>
    <script src="game_tetris.js?v=11"></script>
    <script>
        window.onload = () => {
            startTetris();
        };
    </script>
</body>
</html>
