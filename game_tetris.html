<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS - YONGBALL WORLD</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #game-container {
            box-shadow: 0 0 30px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-title" style="font-size: 24px; color: #ff00ff;">TETRIS</div>
        
        <div id="game-container" style="position: relative; background: #000; border: 4px solid #fff; overflow: hidden; margin-bottom: 20px;">
            <canvas id="tetrisCanvas" width="200" height="400"></canvas>
            <div id="game-score" style="position: absolute; top: 15px; right: 15px; color: #ffff00; font-size: 18px; text-shadow: 2px 2px 0 #000;">SCORE: 0</div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button class="btn" onclick="navigateTo('dashboard.html')" style="padding: 10px 25px;">BACK TO MENU</button>
            <button class="btn" onclick="location.reload()" style="padding: 10px 25px; border-color: #ffff00; color: #ffff00;">RESTART</button>
        </div>
        
        <div style="margin-top: 20px; color: #aaa; font-size: 11px; text-align: center; line-height: 1.6;">
            [ 키보드 방향키로 조작하세요 ]<br>
            ← → : 이동 / ↑ : 회전 / ↓ : 빠르게 내리기
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            startTetris();
        };
    </script>
</body>
</html>
